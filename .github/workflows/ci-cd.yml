name: ci-cd

on:
  push:
    branches: [ main ]
  pull_request:
  # Allow manual pipeline runs from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: "Force run the ML pipeline (dvc repro)"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit promoted model back to repo
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Job 1: Lint, unit tests, security scan
  test-and-scan:
    name: Lint, Test, Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install flake8 black bandit pip-audit

      - name: Lint
        run: |
          flake8 app
          black --check app

      - name: Security Scan
        run: |
          bandit -q -r app || true
          pip-audit -r requirements.txt || true

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q

  # Job 2: ML Pipeline (ingest → validate → preprocess → train → evaluate)
  # DVC stage-level caching means unchanged stages are skipped automatically.
  # If a better model is promoted, it is committed back to the repository.
  ml-pipeline:
    name: ML Pipeline (DVC)
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -r requirements-pipeline.txt

      - name: Initialize DVC
        run: |
          # Only init if not already initialised
          if [ ! -f ".dvc/config" ]; then
            dvc init --no-scm
          fi

      - name: DVC pull cached data (if S3 remote configured)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          if grep -qE "^\s*url\s*=" .dvc/config 2>/dev/null; then
            dvc pull || echo "DVC pull failed or remote not fully configured — continuing"
          else
            echo "No DVC remote configured — skipping pull"
          fi

      - name: Run DVC pipeline
        env:
          MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
        run: dvc repro

      - name: Show pipeline metrics
        run: dvc metrics show || true

      - name: Commit promoted model (if updated)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/model/diabetes_model.pkl data/processed/metrics.json || true
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "ci: promote new model from pipeline run [skip ci]"
            git push
          fi
  
  # Job 3: Build & Push Backend Docker Image
  docker-backend:
    name: Build & Push Backend Image
    needs: [test-and-scan, ml-pipeline]
    # Run even if ml-pipeline was skipped (e.g., on PRs)
    if: always() && needs.test-and-scan.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image repository
        run: echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_REPO }}-backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job 4: Build & Push Frontend Docker Image
  docker-frontend:
    name: Build & Push Frontend Image
    needs: [test-and-scan, ml-pipeline]
    if: always() && needs.test-and-scan.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image repository
        run: echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_REPO }}-frontend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_API_URL=http://${{ secrets.DEPLOY_SSH_HOST }}:8000

  # Job 5: Deploy (optional — requires DEPLOY_ENABLED repository variable)
  deploy:
    name: Deploy (optional)
    needs: [docker-backend, docker-frontend]
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          # ✅ Added mlflow and monitoring to the list
          source: "docker-compose.yml,mlflow,monitoring" 
          target: ${{ secrets.DEPLOY_WORKDIR }}
          
      - name: Remote deploy via SSH (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_WORKDIR }}
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.DEPLOY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
            docker compose pull
            docker compose up -d